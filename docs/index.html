<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedFusion Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 1rem;
            margin: 2rem 0;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 0.5rem;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .note {
            margin-top: 2rem;
            color: #aaa;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SpeedFusion Pro</h1>
        <div class="status">
            <h2>🚀 جاري تجهيز التطبيق</h2>
            <p>نحن نعمل على نشر النسخة الكاملة من التطبيق</p>
        </div>
        
        <div class="features">
            <div class="feature">
                <h3>⚡ سرعة فائقة</h3>
                <p>تحسين فوري للأداء</p>
            </div>
            <div class="feature">
                <h3>🌐 DNS ذكي</h3>
                <p>أسرع سيرفرات DNS</p>
            </div>
            <div class="feature">
                <h3>🔋 توفير بطارية</h3>
                <p>إطالة عمر البطارية</p>
            </div>
            <div class="feature">
                <h3>🛡️ أمان تام</h3>
                <p>حماية خصوصيتك</p>
            </div>
        </div>
        
        <button class="btn" onclick="alert('سيتم إطلاق النسخة الكاملة قريباً!')">
            جرب النسخة التجريبية
        </button>
        
        <div class="note">
            النسخة الكاملة قيد التطوير - قريباً على Google Play
        </div>
    </div>
</body>
</html>
